<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login VIP</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1{
  margin-top:100px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:200px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 Nhập Key 🔥</h1>

<input id="keyInput" placeholder="Nhập key"><br><br>
<button onclick="checkKey()">Vào</button>

<script>
// nếu đã login thì auto vào VIP
if(localStorage.getItem("vip") === "true"){
  window.location.href = "vip.html";
}

async function checkKey(){
  let input = document.getElementById("keyInput").value.trim().toLowerCase();

  try{
    let res = await fetch("./key.json?v=" + Date.now());
    let data = await res.json();

    let valid = data.keys.find(k => k.key.toLowerCase() === input);

    if(valid){

      if(valid.expired === "never"){
        alert("Key VIP vĩnh viễn!");
        localStorage.setItem("vip","true");
        window.location.href = "vip.html";
        return;
      }

      let today = new Date();
      let expired = new Date(valid.expired);

      if(today > expired){
        alert("Key đã hết hạn!");
      }else{
        alert("Key hợp lệ!");
        localStorage.setItem("vip","true");
        window.location.href = "vip.html";
      }

    }else{
      alert("Sai key!");
    }

  }catch(e){
    alert("Lỗi load key.json");
  }
}
</script>

</body>
</html>

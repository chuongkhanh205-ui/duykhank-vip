<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DuyKhanh VIP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  height:100vh;
  background: radial-gradient(circle at top, #111, #000);
  overflow:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* hiệu ứng hạt */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}

/* box */
.box{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(255,0,0,0.2);
}

/* title */
h1{
  margin-bottom:20px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px red;}
  to{ text-shadow:0 0 25px orange;}
}

/* input */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
}

/* button */
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,red,orange);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* message */
#msg{
  margin-top:10px;
  font-size:14px;
}

/* loading */
.loader{
  border:4px solid #333;
  border-top:4px solid red;
  border-radius:50%;
  width:25px;height:25px;
  animation:spin 1s linear infinite;
  margin:10px auto;
  display:none;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">
  <h1>🔥 VIP ACCESS 🔥</h1>

  <input id="keyInput" placeholder="Nhập key...">
  <button onclick="checkKey()">Đăng nhập</button>

  <div class="loader" id="loader"></div>
  <div id="msg"></div>
</div>

<script>
// auto login
if(localStorage.getItem("vip") === "true"){
  window.location.href = "vip.html";
}

async function checkKey(){
  let input = document.getElementById("keyInput").value.trim().toLowerCase();
  let msg = document.getElementById("msg");
  let loader = document.getElementById("loader");

  msg.innerText="";
  loader.style.display="block";

  try{
    let res = await fetch("./key.json?v=" + Date.now());
    let data = await res.json();

    let valid = data.keys.find(k => k.key.toLowerCase() === input);

    if(valid){
      if(valid.expired !== "never"){
        let today = new Date();
        let expired = new Date(valid.expired);

        if(today > expired){
          loader.style.display="none";
          msg.style.color="red";
          msg.innerText="❌ Key hết hạn";
          return;
        }
      }

      localStorage.setItem("vip","true");

      msg.style.color="lime";
      msg.innerText="✔ Đang vào VIP...";

      setTimeout(()=>{
        window.location.href="vip.html";
      },1000);

    }else{
      loader.style.display="none";
      msg.style.color="red";
      msg.innerText="❌ Sai key";
    }

  }catch{
    loader.style.display="none";
    msg.style.color="orange";
    msg.innerText="⚠️ Lỗi load key";
  }
}

/* hiệu ứng hạt */
let c = document.getElementById("bg");
let ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let particles = [];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="rgba(255,0,0,0.5)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.d;
    if(p.y>c.height) p.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

/* chống inspect nhẹ */
document.addEventListener("contextmenu", e=>e.preventDefault());
document.onkeydown = function(e){
  if(e.keyCode==123) return false;
}
</script>

</body>
</html>

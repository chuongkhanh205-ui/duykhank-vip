<!DOCTYPE html>
<html>
<head>
  <title>DuyKhanh VIP</title>
</head>

<body style="background:black; color:white; text-align:center;">

<div id="loginBox">
  <h1>🔥 Nhập Key 🔥</h1>
  <input id="keyInput" placeholder="Nhập key">
  <br><br>
  <button onclick="checkKey()">Vào</button>
  <p id="msg" style="color:red;"></p>
</div>

<div id="content" style="display:none;">
  <h1>🔥 Web VIP 🔥</h1>
  <p>Chào mừng bạn vào hệ thống 🔥</p>
</div>

<script>
async function checkKey() {
  let input = document.getElementById("keyInput").value;

  let res = await fetch("key.json");
  let data = await res.json();

  let valid = data.keys.find(k => k.key === input);

  if(valid){
    let today = new Date().toISOString().split("T")[0];

    if(valid.expired >= today){
      localStorage.setItem("vip_key", input);
      showContent();
    } else {
      document.getElementById("msg").innerText = "Key đã hết hạn!";
    }
  } else {
    document.getElementById("msg").innerText = "Sai key!";
  }
}

function showContent(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("content").style.display = "block";
}

// auto login
window.onload = async function(){
  let savedKey = localStorage.getItem("vip_key");
  if(savedKey){
    let res = await fetch("key.json");
    let data = await res.json();

    let valid = data.keys.find(k => k.key === savedKey);

    if(valid){
      let today = new Date().toISOString().split("T")[0];
      if(valid.expired >= today){
        showContent();
      }
    }
  }
}
</script>

</body>
</html>

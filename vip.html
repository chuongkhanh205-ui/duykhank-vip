<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP PRO MAX</title>

<style>
body{
  margin:0;
  background:black;
  color:#0f0;
  text-align:center;
  font-family:monospace;
}

h1{
  margin-top:100px;
  text-shadow:0 0 10px #0f0;
}

button{
  margin-top:20px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#0f0;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 VIP ACCESS 🔥</h1>
<p>Chào mừng bạn 😎</p>

<button onclick="logout()">Thoát</button>

<script>
// chặn vào thẳng
if(localStorage.getItem("vip") !== "true"){
  window.location.href = "index.html";
}

function logout(){
  localStorage.removeItem("vip");
  window.location.href = "index.html";
}
</script>

</body>
</html>

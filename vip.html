<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DuyKhanh VIP</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

.container{
  max-width:350px;
  margin:40px auto;
  background:#111;
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 20px red;
}

.title{
  text-align:center;
  color:red;
  font-weight:bold;
  margin-bottom:10px;
}

.tabs{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  margin:3px;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:10px;
}

.tabs button.active{
  background:red;
}

.box{
  display:none;
}

.box.active{
  display:block;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
}

.switch{
  width:40px;
  height:20px;
  background:#333;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}

.switch::after{
  content:'';
  width:18px;
  height:18px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:1px;
  left:1px;
  transition:0.3s;
}

.switch.active{
  background:red;
}

.switch.active::after{
  left:21px;
}

button.game{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:red;
  border:none;
  border-radius:10px;
  color:white;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🔥 DUYKHANH VIP 🔥</div>

<div class="tabs">
  <button class="active" onclick="tab('tricks')">Tricks</button>
  <button onclick="tab('target')">Target</button>
  <button onclick="tab('device')">Device</button>
</div>

<!-- TRICKS -->
<div id="tricks" class="box active">
  <div class="item">Aimbot <div class="switch" onclick="toggle(this)"></div></div>
  <div class="item">No Recoil <div class="switch" onclick="toggle(this)"></div></div>
  <div class="item">Aim Lock <div class="switch" onclick="toggle(this)"></div></div>
</div>

<!-- TARGET -->
<div id="target" class="box">
  <div class="item">Head <div class="switch" onclick="toggle(this)"></div></div>
  <div class="item">Chest <div class="switch" onclick="toggle(this)"></div></div>
  <div class="item">Smooth <div class="switch" onclick="toggle(this)"></div></div>
</div>

<!-- DEVICE -->
<div id="device" class="box">
  <div class="item">iPhone 14</div>
  <div class="item">iPhone 14 Pro</div>
  <div class="item">iPhone 15 Pro Max</div>
</div>

<button class="game" onclick="openGame()">🎮 Mở Free Fire</button>

</div>

<script>
if(localStorage.getItem("vip") !== "true"){
  window.location.href = "index.html";
}

function tab(name){
  document.querySelectorAll(".box").forEach(e=>e.classList.remove("active"));
  document.getElementById(name).classList.add("active");

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

function toggle(el){
  el.classList.toggle("active");
}

function openGame(){
  alert("🔥 Đang mở Free Fire (demo)");
  window.location.href = "https://ff.garena.com/";
}
</script>

</body>
</html>

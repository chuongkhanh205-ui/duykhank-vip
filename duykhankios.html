<script>
async function checkKey() {
  let input = document.getElementById("keyInput").value.trim();

  let res = await fetch("./key.json?v=" + Date.now());
  let data = await res.json();

  let valid = data.keys.find(k => k.key.toLowerCase() === input.toLowerCase());

  if(valid){
    if(valid.expired === "never"){
      window.location.href = "./vip.html";
      return;
    }

    let today = new Date();
    let expired = new Date(valid.expired);

    if(today > expired){
      alert("Key đã hết hạn!");
    } else {
      window.location.href = "./vip.html";
    }
  } else {
    alert("Sai key!");
  }
}
</script>
